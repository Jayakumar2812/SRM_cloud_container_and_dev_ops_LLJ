version: 0.0
os: linux

files:
  - source: /
    destination: /var/www/portfolio-app
    overwrite: true

permissions:
  - object: /var/www/portfolio-app
    pattern: "**"
    owner: root
    group: root
    mode: 755

hooks:
  BeforeInstall:
    - location: scripts/install_dependencies.sh
      timeout: 300
      runas: root
  ApplicationStart:
    - location: scripts/start_server.sh
      timeout: 300
      runas: root
  ValidateService:
    - location: scripts/validate_service.sh
      timeout: 300
      runas: root
